name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

jobs:
  build:
    permissions:
      contents: read
      issues: write # solo per la diagnostica automatica su fallimento macOS
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nome: Vettore-windows.exe
            prodotto: dist/Vettore.exe
          - os: macos-latest
            nome: Vettore-macos-apple-silicon
            prodotto: dist/Vettore
          - os: ubuntu-latest
            nome: Vettore-linux
            prodotto: dist/Vettore
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Compila l'eseguibile
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller Vettore.spec

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # porta alta e improbabile: i runner ospitati a volte occupano la 8080
          lsof -iTCP:8123 -sTCP:LISTEN && exit 78 || true
          VETTORE_NO_BROWSER=1 VETTORE_DEBUG_STACK=1 VETTORE_PORTA=8123 VETTORE_DB=/tmp/smoke.db ./dist/Vettore >server.log 2>&1 &
          PID=$!
          echo "$PID" > server.pid
          ok=""
          for i in $(seq 1 150); do
            if ! kill -0 "$PID" 2>/dev/null; then echo "processo terminato" >> server.log; break; fi
            if curl -sf http://127.0.0.1:8123/ | grep -q "data-screen-label"; then ok=1; break; fi
            sleep 2
          done
          curl -sf -o /dev/null http://127.0.0.1:8123/static/logic.js || ok=""
          if [ -z "$ok" ]; then
            echo "--- log del server:"; cat server.log
            echo "--- porta al timeout:"; lsof -nP -iTCP:8123 -sTCP:LISTEN || echo "NESSUNO in ascolto"
            if [ "$(uname)" = "Darwin" ] && kill -0 "$PID" 2>/dev/null; then
              FIGLIO=$(pgrep -P "$PID" | head -1)
              echo "--- processi: padre=$PID figlio=${FIGLIO:-nessuno}"
              echo "--- stack del FIGLIO (sample):"; [ -n "$FIGLIO" ] && sample "$FIGLIO" 2 -file sample.txt >/dev/null 2>&1 && head -60 sample.txt || echo "(non catturato)"
            fi
            kill "$PID" 2>/dev/null || true
            exit 1
          fi
          kill "$PID" 2>/dev/null || true

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VETTORE_NO_BROWSER = "1"
          $env:VETTORE_PORTA = "8123"
          $env:VETTORE_DB = "$env:TEMP\smoke.db"
          $p = Start-Process -FilePath "dist\Vettore.exe" -PassThru
          $ok = $false
          foreach ($i in 1..90) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8123/" -UseBasicParsing -TimeoutSec 2
              if ($r.Content -match "data-screen-label") { $ok = $true; break }
            } catch { Start-Sleep -Seconds 2 }
          }
          Stop-Process -Id $p.Id -Force
          if (-not $ok) { exit 1 }

      - name: Diagnostica pubblica su fallimento (macOS)
        if: failure() && runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo '```'
            sw_vers; uname -m
            echo "--- porta 8123:"; lsof -nP -iTCP:8123 -sTCP:LISTEN || echo "libera"
            echo "--- server.log:"; head -80 server.log 2>/dev/null || echo "(assente)"
            echo "--- stack (sample) se catturato:"; head -100 sample.txt 2>/dev/null || echo "(assente)"
            echo '```'
          } > diagnosi.md
          gh issue create --title "Diagnostica smoke macOS · run ${{ github.run_id }}" --body-file diagnosi.md || true

      - name: Rinomina il prodotto
        shell: bash
        run: mv "${{ matrix.prodotto }}" "${{ matrix.nome }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.nome }}
          path: ${{ matrix.nome }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true

      - name: Checksum degli eseguibili
        run: sha256sum Vettore-windows.exe Vettore-macos-apple-silicon Vettore-linux > SHA256SUMS.txt

      - uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          files: |
            Vettore-windows.exe
            Vettore-macos-apple-silicon
            Vettore-linux
            SHA256SUMS.txt
          body: |
            **Vettore senza installare nulla**: scarica il file per il tuo sistema, doppio click, e il browser si apre su http://localhost:8080.

            - **Windows** → `Vettore-windows.exe` (se SmartScreen avvisa: *Ulteriori informazioni → Esegui comunque*)
            - **macOS** (Apple Silicon, M1 o successivi) → `Vettore-macos-apple-silicon` — al primo avvio: tasto destro → *Apri* (binario non firmato); se scaricato dal browser può servire `xattr -d com.apple.quarantine <file>`
            - **Linux** → `Vettore-linux` (poi `chmod +x Vettore-linux`)
            - **Mac Intel**: usa `avvio.sh` dal repository (serve solo Python)

            **Verifica dell'integrità** (consigliata, i binari non sono firmati): scarica anche `SHA256SUMS.txt` e confronta con `shasum -a 256 <file>` (macOS/Linux) o `Get-FileHash <file>` (Windows).

            I dati restano in `~/.vettore/vettore.db`. Le novità di questa versione sono nel [CHANGELOG](https://github.com/It-Energy-Ai/Logistica_Gas_Natural_Up_Stream/blob/main/CHANGELOG.md).
