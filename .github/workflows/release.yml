name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            nome: Vettore-windows.exe
            prodotto: dist/Vettore.exe
          - os: macos-latest
            nome: Vettore-macos-apple-silicon
            prodotto: dist/Vettore
          - os: ubuntu-latest
            nome: Vettore-linux
            prodotto: dist/Vettore
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compila l'eseguibile
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller Vettore.spec

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # porta alta e improbabile: i runner ospitati a volte occupano la 8080
          lsof -iTCP:8123 -sTCP:LISTEN && exit 78 || true
          VETTORE_NO_BROWSER=1 VETTORE_PORTA=8123 VETTORE_DB=/tmp/smoke.db ./dist/Vettore >server.log 2>&1 &
          PID=$!
          ok=""
          for i in $(seq 1 90); do
            if ! kill -0 "$PID" 2>/dev/null; then echo "processo terminato" >> server.log; break; fi
            if curl -sf http://127.0.0.1:8123/ | grep -q "data-screen-label"; then ok=1; break; fi
            sleep 2
          done
          curl -sf -o /dev/null http://127.0.0.1:8123/static/logic.js || ok=""
          kill "$PID" 2>/dev/null || true
          if [ -z "$ok" ]; then echo "--- log del server:"; cat server.log; exit 1; fi

      - name: Diagnostica pubblica su fallimento (macOS)
        if: failure() && runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo '```'
            sw_vers; uname -m
            echo "--- porta 8123:"; lsof -iTCP:8123 -sTCP:LISTEN || echo "libera"
            echo "--- server.log:"; head -80 server.log 2>/dev/null || echo "(assente)"
            echo '```'
          } > diagnosi.md
          gh issue create --title "Diagnostica smoke macOS · run ${{ github.run_id }}" --body-file diagnosi.md || true

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VETTORE_NO_BROWSER = "1"
          $env:VETTORE_DB = "$env:TEMP\smoke.db"
          $p = Start-Process -FilePath "dist\Vettore.exe" -PassThru
          $ok = $false
          foreach ($i in 1..30) {
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8080/" -UseBasicParsing -TimeoutSec 2
              if ($r.Content -match "data-screen-label") { $ok = $true; break }
            } catch { Start-Sleep -Seconds 1 }
          }
          Stop-Process -Id $p.Id -Force
          if (-not $ok) { exit 1 }

      - name: Rinomina il prodotto
        shell: bash
        run: mv "${{ matrix.prodotto }}" "${{ matrix.nome }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.nome }}
          path: ${{ matrix.nome }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            Vettore-windows.exe
            Vettore-macos-apple-silicon
            Vettore-linux
          body: |
            **Vettore senza installare nulla**: scarica il file per il tuo sistema, doppio click, e il browser si apre su http://localhost:8080.

            - **Windows** → `Vettore-windows.exe` (se SmartScreen avvisa: *Ulteriori informazioni → Esegui comunque*)
            - **macOS** (Apple Silicon, M1 o successivi) → `Vettore-macos-apple-silicon` — al primo avvio: tasto destro → *Apri* (binario non firmato); se scaricato dal browser può servire `xattr -d com.apple.quarantine <file>`
            - **Linux** → `Vettore-linux` (poi `chmod +x Vettore-linux`)
            - **Mac Intel**: usa `avvio.sh` dal repository (serve solo Python)

            I dati restano in `~/.vettore/vettore.db`. Niente Docker, niente Python: tutto incluso.
