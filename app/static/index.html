<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vettore · Logistica Gas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'IBM Plex Sans',system-ui,sans-serif;background:#F2F5F7;-webkit-font-smoothing:antialiased}
:root{--prim:#0E5A75;--acc:#2FA37C;--primText:var(--prim);--bg:#F2F5F7;--surface:#FFFFFF;--surface2:#EBF0F3;--ink:#10222D;--ink2:#5A6E7A;--ink3:#8CA0AB;--line:rgba(16,34,45,.11);--shadow:0 1px 2px rgba(16,34,45,.05),0 8px 24px rgba(16,34,45,.06)}
[data-theme="dark"]{--primText:color-mix(in oklab,var(--prim) 45%,#DCE9F2);--bg:#0C1319;--surface:#131E27;--surface2:#1A2833;--ink:#E9EFF3;--ink2:#9DB1BC;--ink3:#647985;--line:rgba(233,239,243,.1);--shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px rgba(0,0,0,.35)}
a{color:var(--acc);text-decoration:none}
a:hover{color:var(--acc);text-decoration:underline}
input::placeholder{color:var(--ink3)}
@keyframes vtFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes vtSpin{to{transform:rotate(360deg)}}
[data-vh="0"]:hover{background:var(--surface2);color:var(--ink)}
[data-vh="1"]:hover{background:var(--surface2)}
[data-vf="2"]:focus{border-color:var(--prim);box-shadow:0 0 0 3px color-mix(in oklab,var(--prim) 16%,transparent)}
[data-vh="3"]:hover{filter:brightness(1.12)}
[data-vh="4"]:hover{border-color:color-mix(in oklab,var(--prim) 45%,var(--line));background:color-mix(in oklab,var(--prim) 5%,var(--surface))}
[data-vh="5"]:hover{text-decoration:underline}
[data-vh="6"]:hover{color:var(--ink)}
[data-vh="7"]:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
[data-vh="8"]:hover{background:color-mix(in oklab,var(--prim) 8%,transparent)}
[data-vh="9"]:hover{border-color:rgba(197,96,80,.4);color:#C05B4D;background:rgba(197,96,80,.08)}
[data-vh="10"]:hover{border-color:rgba(197,96,80,.4);color:#C05B4D}

.hub-card:hover>div:nth-child(1){transform:rotate(-13deg) translate(-36px,10px) !important}
.hub-card:hover>div:nth-child(2){transform:rotate(9deg) translate(32px,0px) !important}
.hub-card:hover>div:nth-child(3){transform:translateY(16px) rotate(-3deg) !important}
.hub-card:hover>div:nth-child(4){transform:translateY(-14px) scale(1.03) rotate(.5deg) !important;box-shadow:0 26px 52px color-mix(in oklab,var(--prim) 28%,transparent) !important}

</style>
</head>
<body>
<div id="app"></div>
<template id="app-template">
<div data-theme="{{ theme }}" style="--prim:{{ primC }};--acc:{{ accC }};min-height:100vh;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif">

<sc-if value="{{ loggedIn }}" hint-placeholder-val="{{ false }}">
<header style="position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:22px;height:58px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--line)">
  <div onClick="{{ goHub }}" style="display:flex;align-items:center;gap:10px;cursor:pointer">
    <span style="width:26px;height:26px;display:grid;place-items:center;background:linear-gradient(135deg,var(--acc),var(--prim));border-radius:8px"><span style="display:block;width:10px;height:10px;background:rgba(255,255,255,.95);border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span></span>
    <span style="font-weight:700;letter-spacing:.16em;font-size:13px">VETTORE</span>
  </div>
  <sc-if value="{{ hasBack }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ goBack }}" title="Torna indietro" style="width:32px;height:32px;display:grid;place-items:center;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;font-size:16px;line-height:1;font-family:inherit;transition:background .15s" data-vh="0">←</button>
  </sc-if>
  <nav style="display:flex;align-items:center;gap:8px;font-size:13px">
    <sc-for list="{{ crumbs }}" as="c" hint-placeholder-count="2">
      <span style="display:flex;align-items:center;gap:8px"><span style="color:var(--ink3)">{{ c.pre }}</span><span onClick="{{ c.go }}" style="cursor:{{ c.cur }};color:{{ c.col }};font-weight:{{ c.fw }}">{{ c.label }}</span></span>
    </sc-for>
  </nav>
  <div style="flex:1"></div>
  <button onClick="{{ toggleTheme }}" title="Cambia tema" style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:99px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500" data-vh="1">
    <span style="width:11px;height:11px;border-radius:50%;background:conic-gradient(var(--ink2) 0 50%,transparent 50% 100%);border:1px solid var(--ink2)"></span>
    Tema {{ themeLabel }}
  </button>
  <div style="width:1px;height:24px;background:var(--line)"></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:color-mix(in oklab,var(--prim) 14%,transparent);color:var(--primText);font-size:12px;font-weight:700">MR</span>
    <span style="display:flex;flex-direction:column;line-height:1.25">
      <span style="font-size:13px;font-weight:600">Marco Rossi</span>
      <span style="font-size:11px;color:var(--ink3)">Azienda 1</span>
    </span>
  </div>
  <button onClick="{{ logout }}" style="padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:500" data-vh="0">Esci</button>
</header>
</sc-if>

<sc-if value="{{ screenLogin }}" hint-placeholder-val="{{ true }}">
<section data-screen-label="Login" style="display:grid;grid-template-columns:minmax(420px,44%) 1fr;min-height:100vh;animation:vtFade .3s ease">
  <div style="position:relative;overflow:hidden;background:linear-gradient(165deg,#0F2C3B 0%,#0A1D29 100%);color:#E9EFF3;display:flex;flex-direction:column;justify-content:space-between;padding:44px 48px">
    <div style="position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent 0 79px,rgba(233,239,243,.045) 79px 80px),repeating-linear-gradient(0deg,transparent 0 79px,rgba(233,239,243,.045) 79px 80px)"></div>
    <div style="position:relative;display:flex;align-items:center;gap:12px">
      <span style="width:30px;height:30px;display:grid;place-items:center;background:linear-gradient(135deg,var(--acc),#1B6E8C);border-radius:9px"><span style="display:block;width:12px;height:12px;background:rgba(255,255,255,.95);border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span></span>
      <span style="font-weight:700;letter-spacing:.18em;font-size:14px">VETTORE</span>
    </div>
    <div style="position:relative;display:flex;flex-direction:column;gap:18px;max-width:420px">
      <h1 style="margin:0;font-size:33px;line-height:1.22;font-weight:600;letter-spacing:-.01em;text-wrap:pretty">La logistica del gas naturale, in un'unica piattaforma.</h1>
      <p style="margin:0;font-size:15px;line-height:1.6;color:rgba(233,239,243,.62);text-wrap:pretty">Il portale operativo per shipper e trader sul mercato italiano.</p>
      <div style="display:flex;flex-direction:column;gap:11px;margin-top:8px">
        <div style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:rgba(233,239,243,.8)"><span style="width:6px;height:6px;border-radius:50%;background:var(--acc)"></span>Nomine e rinomine sulla rete di trasporto</div>
        <div style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:rgba(233,239,243,.8)"><span style="width:6px;height:6px;border-radius:50%;background:var(--acc)"></span>Bilanciamento e posizione PSV in tempo reale</div>
        <div style="display:flex;align-items:center;gap:10px;font-size:13.5px;color:rgba(233,239,243,.8)"><span style="width:6px;height:6px;border-radius:50%;background:var(--acc)"></span>Capacità, stoccaggio e reportistica regolatoria</div>
      </div>
    </div>
    <div style="position:relative;font-size:12px;color:rgba(233,239,243,.4)">© 2026 Vettore S.r.l. · Milano</div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;padding:40px;background:var(--bg)">
    <div style="width:380px;display:flex;flex-direction:column;gap:22px">
      <div style="display:flex;flex-direction:column;gap:6px">
        <h2 style="margin:0;font-size:24px;font-weight:700;letter-spacing:-.01em">Accedi</h2>
        <p style="margin:0;font-size:14px;color:var(--ink2)">Entra nel tuo ambiente di lavoro.</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <label style="display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink2)">Email aziendale
          <input type="email" placeholder="nome@azienda.it" value="{{ loginEmail }}" onChange="{{ setLoginEmail }}" onKeyDown="{{ loginKey }}" style="width:100%;box-sizing:border-box;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s" data-vf="2">
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink2)">Password
          <input type="password" placeholder="••••••••••" value="{{ loginPass }}" onChange="{{ setLoginPass }}" onKeyDown="{{ loginKey }}" style="width:100%;box-sizing:border-box;padding:12px 14px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s" data-vf="2">
        </label>
        <div style="display:flex;justify-content:flex-end"><a href="#" style="font-size:12.5px;font-weight:500">Password dimenticata?</a></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <button onClick="{{ doLogin }}" style="width:100%;padding:13px;border:none;border-radius:9px;background:var(--prim);color:#fff;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;transition:filter .15s" data-vh="3">Accedi</button>
        <div style="display:flex;align-items:center;gap:12px;color:var(--ink3);font-size:11.5px"><span style="flex:1;height:1px;background:var(--line)"></span>oppure<span style="flex:1;height:1px;background:var(--line)"></span></div>
        <button onClick="{{ doSSO }}" style="width:100%;padding:12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);font-family:inherit;font-size:13.5px;font-weight:500;cursor:pointer" data-vh="1">Accedi con SSO aziendale</button>
      </div>
      <p style="margin:0;font-size:11.5px;line-height:1.5;color:var(--ink3);text-wrap:pretty">L'accesso è riservato agli utenti autorizzati. Per richiedere le credenziali contatta l'amministratore della tua società.</p>
    </div>
  </div>
  <sc-if value="{{ ssoOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;animation:vtFade .18s ease">
      <div style="position:absolute;inset:0;background:rgba(6,14,20,.55);backdrop-filter:blur(2px)"></div>
      <div style="position:relative;width:400px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.35);padding:26px 28px;display:flex;flex-direction:column;gap:18px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="width:28px;height:28px;display:grid;place-items:center;background:color-mix(in oklab,var(--prim) 12%,transparent);border-radius:8px;color:var(--primText);font-size:11px;font-weight:700">ID</span>
          <span style="display:flex;flex-direction:column;line-height:1.3">
            <span style="font-size:13.5px;font-weight:700">Azienda 1 · Identity</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink3)">sso.azienda1.it</span>
          </span>
        </div>
        <div style="height:1px;background:var(--line)"></div>
        <sc-if value="{{ ssoRedirect }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 0">
            <span style="width:30px;height:30px;border-radius:50%;border:3px solid var(--surface2);border-top-color:var(--prim);animation:vtSpin .8s linear infinite"></span>
            <span style="font-size:13px;color:var(--ink2)">Reindirizzamento al provider aziendale…</span>
          </div>
        </sc-if>
        <sc-if value="{{ ssoPickStep }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;gap:10px">
            <span style="font-size:13.5px;font-weight:600">Scegli un account</span>
            <div onClick="{{ ssoPick }}" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s" data-vh="4">
              <span style="width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:color-mix(in oklab,var(--prim) 14%,transparent);color:var(--primText);font-size:12px;font-weight:700">MR</span>
              <span style="display:flex;flex-direction:column;gap:1px"><span style="font-size:13px;font-weight:600">Marco Rossi</span><span style="font-size:11px;color:var(--ink3)">m.rossi@azienda1.it</span></span>
            </div>
            <div onClick="{{ ssoPick }}" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s" data-vh="4">
              <span style="width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--surface2);color:var(--ink2);font-size:12px;font-weight:700">LB</span>
              <span style="display:flex;flex-direction:column;gap:1px"><span style="font-size:13px;font-weight:600">Laura Bianchi</span><span style="font-size:11px;color:var(--ink3)">l.bianchi@azienda1.it</span></span>
            </div>
            <span style="font-size:12px;color:var(--primText);font-weight:600;cursor:pointer;padding:4px 2px" data-vh="5">Usa un altro account</span>
          </div>
        </sc-if>
        <sc-if value="{{ ssoAuth }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:18px 0">
            <span style="width:30px;height:30px;border-radius:50%;border:3px solid var(--surface2);border-top-color:var(--acc);animation:vtSpin .8s linear infinite"></span>
            <span style="font-size:13px;color:var(--ink2)">Autenticazione in corso…</span>
          </div>
        </sc-if>
        <div style="display:flex;justify-content:flex-end">
          <button onClick="{{ ssoCancel }}" style="padding:8px 14px;border:none;background:none;color:var(--ink3);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer" data-vh="6">Annulla</button>
        </div>
      </div>
    </div>
  </sc-if>
</section>
</sc-if>

<sc-if value="{{ screenHub }}" hint-placeholder-val="{{ false }}">
<section data-screen-label="Hub moduli" style="min-height:calc(100vh - 58px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:60px 24px;animation:vtFade .3s ease">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--ink3)">AMBIENTE DI LAVORO</span>
    <h1 style="margin:0;font-size:26px;font-weight:700;letter-spacing:-.01em">Buongiorno, Marco</h1>
    <p style="margin:0;font-size:14px;color:var(--ink2)">Seleziona un modulo per iniziare.</p>
  </div>
  <div style="display:flex;gap:150px;flex-wrap:wrap;justify-content:center">
    <sc-for list="{{ hubCards }}" as="hc" hint-placeholder-count="2">
      <div class="hub-card" style="position:relative;width:252px;height:352px;cursor:pointer">
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,color-mix(in oklab,var(--prim) 9%,var(--surface)) 0 6px,var(--surface) 6px 12px);border:1px solid var(--line);border-radius:16px;transform:{{ hc.t1 }};box-shadow:0 1px 2px rgba(16,34,45,.08);transition:transform .55s cubic-bezier(.34,1.56,.64,1) .06s"></div>
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(-45deg,color-mix(in oklab,var(--prim) 9%,var(--surface)) 0 6px,var(--surface) 6px 12px);border:1px solid var(--line);border-radius:16px;transform:{{ hc.t2 }};box-shadow:0 1px 2px rgba(16,34,45,.08);transition:transform .55s cubic-bezier(.34,1.56,.64,1) .09s"></div>
        <div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,color-mix(in oklab,var(--prim) 6%,var(--surface)) 0 6px,var(--surface) 6px 12px);border:1px solid var(--line);border-radius:16px;transform:{{ hc.t3 }};box-shadow:0 1px 2px rgba(16,34,45,.08);transition:transform .55s cubic-bezier(.34,1.56,.64,1) .03s"></div>
        <div onClick="{{ hc.go }}" style="position:absolute;inset:0;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:{{ hc.shadow }};cursor:pointer;display:flex;align-items:center;justify-content:center;transform:{{ hc.top }};transition:transform .55s cubic-bezier(.34,1.56,.64,1),box-shadow .55s ease">
          <div style="position:absolute;inset:11px;border:1px solid var(--line);border-radius:10px"></div>
          <div style="position:absolute;top:16px;left:18px;display:flex;flex-direction:column;align-items:center;gap:5px">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--prim)">{{ hc.code }}</span>
            <span style="display:block;width:8px;height:8px;background:var(--acc);border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span>
          </div>
          <div style="position:absolute;bottom:16px;right:18px;display:flex;flex-direction:column;align-items:center;gap:5px;transform:rotate(180deg)">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--prim)">{{ hc.code }}</span>
            <span style="display:block;width:8px;height:8px;background:var(--acc);border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:0 28px;text-align:center">
            <span style="display:block;width:56px;height:56px;background:linear-gradient(135deg,var(--acc),var(--prim));border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span>
            <div style="display:flex;flex-direction:column;gap:6px;margin-top:6px">
              <h2 style="margin:0;font-size:21px;font-weight:700;letter-spacing:-.01em">{{ hc.title }}</h2>
              <p style="margin:0;font-size:12px;color:var(--ink2)">{{ hc.sub }}</p>
            </div>
            <span style="font-size:11.5px;font-weight:600;color:var(--primText);background:color-mix(in oklab,var(--prim) 10%,transparent);padding:5px 12px;border-radius:99px">Apri modulo →</span>
          </div>
        </div>
      </div>
    </sc-for>
  </div>
  <p style="margin:0;font-size:12px;color:var(--ink3)">Altri moduli verranno attivati dal tuo amministratore.</p>
</section>
</sc-if>

<sc-if value="{{ screenModuli }}" hint-placeholder-val="{{ false }}">
<section data-screen-label="Logistica Gas" style="max-width:1180px;margin:0 auto;padding:36px 28px 60px;animation:vtFade .3s ease">
  <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px">
    <div style="display:flex;flex-direction:column;gap:6px">
      <h1 style="margin:0;font-size:24px;font-weight:700;letter-spacing:-.01em">Logistica Gas</h1>
      <p style="margin:0;font-size:14px;color:var(--ink2)">Seleziona un'area di lavoro.</p>
    </div>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--line);padding:7px 12px;border-radius:8px">Giorno gas · 17/07/2026</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px">
    <sc-for list="{{ moduli }}" as="m" hint-placeholder-count="6">
      <div onClick="{{ m.go }}" style="display:flex;flex-direction:column;gap:12px;background:var(--surface);border:1px solid {{ m.border }};border-radius:13px;padding:22px;cursor:{{ m.cursor }};transition:transform .2s ease,box-shadow .2s ease" data-vh="7">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="width:38px;height:38px;display:grid;place-items:center;background:color-mix(in oklab,var(--prim) 9%,transparent);border-radius:10px"><span style="display:block;width:14px;height:14px;background:linear-gradient(135deg,var(--acc),var(--prim));border-radius:0 50% 50% 50%;transform:rotate(45deg)"></span></span>
          <sc-if value="{{ m.primary }}" hint-placeholder-val="{{ false }}"><span style="font-size:11px;font-weight:600;color:var(--primText);background:color-mix(in oklab,var(--prim) 10%,transparent);padding:4px 10px;border-radius:99px">Apri →</span></sc-if>
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <h3 style="margin:0;font-size:15.5px;font-weight:600">{{ m.title }}</h3>
          <p style="margin:0;font-size:12.5px;line-height:1.5;color:var(--ink2);text-wrap:pretty">{{ m.desc }}</p>
        </div>
        <div style="height:1px;background:var(--line);margin-top:2px"></div>
        <div style="display:flex;align-items:baseline;gap:8px">

    </div>
    <div style="display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px 22px">
      <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:6px"><h3 style="margin:0;font-size:15px;font-weight:600">Report programmati</h3><span style="font-size:12px;color:var(--ink3)">Invio automatico via email</span></div>
      <sc-for list="{{ repProg }}" as="rp" hint-placeholder-count="3">
        <div style="display:flex;align-items:center;gap:12px;min-height:50px;padding:2px 0;border-top:1px solid var(--line)">
          <span style="flex:1;font-size:13px;font-weight:600">{{ rp.name }}</span>
          <span onClick="{{ rp.go }}" style="width:38px;height:22px;border-radius:99px;background:{{ rp.kBg }};border:1px solid var(--line);position:relative;cursor:pointer;transition:background .2s;flex:none;box-sizing:border-box">
            <span style="position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transform:{{ rp.kX }};transition:transform .2s"></span>
          </span>
        </div>
      </sc-for>
      <span style="font-size:11.5px;color:var(--ink3);margin-top:12px;text-wrap:pretty">I report vengono inviati agli utenti abilitati del tuo ambiente.</span>
    </div>
  </div>
</section>
</sc-if>

</div>
</template>
<script src="/static/runtime.js"></script>
<script src="/static/logic.js"></script>
</body>
</html>
